version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: db
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docs/database/db_schema.sql:/docker-entrypoint-initdb.d/01_schema.sql
      - ./docs/database/db_seed.sql:/docker-entrypoint-initdb.d/02_seed.sql
    ports:
      - "5434:5432"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.backend
    container_name: backend
    restart: always
    environment:
      DATABASE_URL: ${DATABASE_URL}
      VITE_BACKEND_URL: ${VITE_BACKEND_URL}
    ports:
      - "3001:3001"
    depends_on:
      - db
    command: sh -c "npm run migrate && node server.js"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.frontend
    container_name: frontend
    restart: always
    environment:
      VITE_BACKEND_URL: ${FRONTEND_BACKEND_URL}
    depends_on:
      - backend
    volumes:
      - /var/www/giornaledeilavori.gabrielebuttice.com/dist:/app/dist_folder_vps
    command: sh -c "cp -r /app/dist/* /app/dist_folder_vps/ && tail -f /dev/null"

volumes:
  postgres_data: